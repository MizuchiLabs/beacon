version: "3"

env:
  CGO_ENABLED: 0
  IMAGE: ghcr.io/mizuchilabs/beacon
  BEACON_CONFIG: ./examples/config.yaml
  # BEACON_CHART_TYPE: bars

tasks:
  seed:
    desc: Generate seed data
    cmds:
      - go run ./examples/main.go

  dev:
    desc: Run backend and frontend concurrently
    deps: [backend, frontend]

  backend:
    desc: Run backend
    cmds:
      - go run .

  frontend:
    desc: Run frontend
    dir: web
    cmds:
      - pnpm run dev

  update:
    desc: Update dependencies
    cmds:
      - go get -u ./...
      - cd web && pnpm update --latest

  gen:
    desc: Generate sqlc
    cmds:
      - sqlc generate

  lint:
    desc: Run go vet & lint
    cmds:
      - go mod tidy
      - go fmt ./...
      - go vet ./...
      - govulncheck ./...
      - go test -cover ./...
      - gosec -exclude-generated ./...

  build:
    desc: Build binary
    cmds:
      - go generate ./...
      - go build -ldflags="-s -w" -trimpath -o beacon

  snapshot:
    desc: Build snapshot
    cmds:
      - goreleaser --snapshot --clean --skip=validate,sign,sbom,archive
      - docker tag goreleaser.ko.local:latest $IMAGE:nightly
      - grype $IMAGE:nightly

  snapshot:push:
    desc: Build and push snapshot to registry
    deps: [snapshot]
    cmds:
      - docker push $IMAGE:nightly
