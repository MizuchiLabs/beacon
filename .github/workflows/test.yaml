name: Test

on:
  push:
    branches: [main]
    paths-ignore:
      - "LICENSE"
      - ".gitignore"
      - ".editorconfig"
      - ".vscode/**"
      - ".idea/**"
      - "**/*.md"
      - "**/*.txt"
  pull_request:
    branches: [main]
    paths-ignore:
      - "LICENSE"
      - ".gitignore"
      - ".editorconfig"
      - ".vscode/**"
      - ".idea/**"
      - "**/*.md"
      - "**/*.txt"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: "web/pnpm-lock.yaml"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Build frontend
        run: |
          cd web
          pnpm install
          pnpm build

      - name: Lint and test
        run: |
          go mod tidy
          go mod verify
          go fmt ./...
          go vet ./...
          go test ./...

      - name: Run GolangCI-Lint
        uses: golangci/golangci-lint-action@v9
        with:
          args: --timeout=10m

      - name: Build backend
        run: go build -ldflags="-s -w" -o bin/

      - name: ghcr.io cleanup
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          keep-n-tagged: 10
          delete-untagged: true
          delete-ghost-images: true
          delete-partial-images: true
          delete-orphaned-images: true
